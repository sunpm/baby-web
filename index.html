<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/baby-log-icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/baby-log-icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/baby-log-icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta
      name="description"
      content="宝宝记录：一键记录喂奶、拉粑粑、益生菌，支持离线和家人跨设备同步。"
    />
    <meta name="theme-color" content="#0c111b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="宝宝记录" />
    <meta property="og:title" content="宝宝记录" />
    <meta
      property="og:description"
      content="单手快速记录，半夜也能轻松点几下完成。"
    />
    <meta property="og:type" content="website" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #090a0b;
      }

      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(100% 80% at 50% -10%, rgba(14, 165, 233, 0.08), transparent 45%),
          radial-gradient(70% 70% at 0% 0%, rgba(16, 185, 129, 0.08), transparent 36%),
          #090a0b;
        color: rgba(250, 250, 250, 0.92);
        font-family:
          'SF Pro Text',
          'Segoe UI',
          'PingFang SC',
          'Hiragino Sans GB',
          sans-serif;
        transition: opacity 0.2s ease;
      }

      #app-boot.boot-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #app-boot .boot-inner {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid rgba(82, 82, 91, 0.5);
        border-radius: 14px;
        padding: 10px 12px;
        background: rgba(24, 24, 27, 0.7);
        backdrop-filter: blur(12px);
        font-size: 13px;
      }

      #app-boot .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: #34d399;
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.35);
        animation: bootPulse 1.1s ease-in-out infinite;
      }

      @keyframes bootPulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.35);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 7px rgba(52, 211, 153, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(52, 211, 153, 0);
        }
      }
    </style>
    <title>宝宝记录</title>
  </head>
  <body>
    <div id="app-boot">
      <div class="boot-inner">
        <span class="boot-dot"></span>
        <span>正在打开宝宝记录…</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
