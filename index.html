<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/baby-log-icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/baby-log-icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/baby-log-icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta
      name="description"
      content="喂养日记：一键记录喂奶、拉粑粑、补充，支持离线和家人跨设备同步。"
    />
    <meta name="theme-color" content="#0c111b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="喂养日记" />
    <meta property="og:title" content="喂养日记" />
    <meta
      property="og:description"
      content="单手快速记录，半夜也能轻松点几下完成。"
    />
    <meta property="og:type" content="website" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
    <style>
      :root {
        color-scheme: light dark;
        --app-bg: #f8fafc;
        --app-glow-a: rgba(16, 185, 129, 0.08);
        --app-glow-b: rgba(14, 165, 233, 0.06);
        --surface-bg: rgba(255, 255, 255, 0.75);
        --surface-border-strong: rgba(148, 163, 184, 0.2);
        --text-primary: #0f172a;
        --brand-accent: #10b981;
        --brand-accent-shadow-solid: rgba(16, 185, 129, 0.35);
        --brand-accent-shadow-clear: rgba(16, 185, 129, 0);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --app-bg: #090a0b;
          --app-glow-a: rgba(16, 185, 129, 0.08);
          --app-glow-b: rgba(14, 165, 233, 0.06);
          --surface-bg: rgba(24, 24, 27, 0.65);
          --surface-border-strong: rgba(82, 82, 91, 0.6);
          --text-primary: #fafafa;
          --brand-accent: #34d399;
          --brand-accent-shadow-solid: rgba(52, 211, 153, 0.35);
          --brand-accent-shadow-clear: rgba(52, 211, 153, 0);
        }
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--app-bg);
      }

      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(100% 80% at 50% -10%, var(--app-glow-b), transparent 45%),
          radial-gradient(70% 70% at 0% 0%, var(--app-glow-a), transparent 36%),
          var(--app-bg);
        color: var(--text-primary);
        font-family:
          'SF Pro Text',
          'Segoe UI',
          'PingFang SC',
          'Hiragino Sans GB',
          sans-serif;
        transition: opacity 0.2s ease;
      }

      #app-boot.boot-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #app-boot .boot-inner {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--surface-border-strong);
        border-radius: 14px;
        padding: 10px 12px;
        background: var(--surface-bg);
        backdrop-filter: blur(12px);
        font-size: 13px;
      }

      #app-boot .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: var(--brand-accent);
        box-shadow: 0 0 0 0 var(--brand-accent-shadow-solid);
        animation: bootPulse 1.1s ease-in-out infinite;
      }

      @keyframes bootPulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 var(--brand-accent-shadow-solid);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 7px var(--brand-accent-shadow-clear);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 var(--brand-accent-shadow-clear);
        }
      }
    </style>
    <title>喂养日记</title>
  </head>
  <body>
    <div id="app-boot">
      <div class="boot-inner">
        <span class="boot-dot"></span>
        <span data-boot-text>正在打开喂养日记…</span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
