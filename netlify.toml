[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"
  PNPM_VERSION = "10.9.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"

  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
